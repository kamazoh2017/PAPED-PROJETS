name: Deploy — Hébergeur (MySQL + Passenger)

# master  → PROD     (paped-projet.mshpcmu.ci)
# preprod → PREPROD  (dev-paped-projet.mshpcmu.ci)
# Passenger gère le process Node.js (géré via cPanel Setup Node.js App)
# Redémarrage = `touch tmp/restart.txt` (pas de PM2)
on:
  push:
    branches:
      - master
      - preprod
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environnement cible'
        required: true
        default: 'preprod'
        type: choice
        options: [preprod, master]

# ─────────────────────────────────────────────────────────
# Secrets GitHub requis (Settings → Secrets → Actions) :
#
#   SSH_HOST           IP ou domaine du serveur
#   SSH_USER           mshpcmu
#   SSH_KEY            Clé privée SSH
#   SSH_PORT           22
#
#   PREPROD_APP_DIR    /home/mshpcmu/apps/paped-projet-preprod
#   PREPROD_MYSQL_URL  mysql://user:pass@localhost:3306/..._preprod
#
#   PROD_APP_DIR       /home/mshpcmu/apps/paped-projet
#   PROD_MYSQL_URL     mysql://user:pass@localhost:3306/..._prod
# ─────────────────────────────────────────────────────────

jobs:
  deploy:
    name: Deploy → ${{ (github.ref_name == 'master' || github.event.inputs.environment == 'master') && 'PROD' || 'PREPROD' }}
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── PREPROD (branch preprod) ──────────────────────
      - name: Deploy PREPROD
        if: github.ref_name == 'preprod' || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'preprod')
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          command_timeout: 900s
          script: |
            set -e
            export PATH="$HOME/.local/node_modules/.bin:$PATH"
            cd "${{ secrets.PREPROD_APP_DIR }}"
            echo "── [1/6] Pull preprod ──"
            git pull origin preprod
            echo "── [2/6] Dépendances ──"
            npm ci --omit=dev
            echo "── [3/6] Prisma generate ──"
            export DATABASE_URL="${{ secrets.PREPROD_MYSQL_URL }}"
            npx prisma generate --schema prisma/mysql/schema.prisma
            echo "── [4/6] Migrations MySQL ──"
            npx prisma migrate deploy --schema prisma/mysql/schema.prisma
            echo "── [5/6] Build Next.js ──"
            npm run hebergeur:build
            echo "── [6/6] Redémarrage Passenger ──"
            mkdir -p tmp
            touch tmp/restart.txt
            echo "✓ PREPROD déployé — dev-paped-projet.mshpcmu.ci"

      # ── PROD (branch master) ──────────────────────────
      - name: Deploy PROD
        if: github.ref_name == 'master' || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'master')
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          command_timeout: 900s
          script: |
            set -e
            export PATH="$HOME/.local/node_modules/.bin:$PATH"
            cd "${{ secrets.PROD_APP_DIR }}"
            echo "── [1/6] Pull master ──"
            git pull origin master
            echo "── [2/6] Dépendances ──"
            npm ci --omit=dev
            echo "── [3/6] Prisma generate ──"
            export DATABASE_URL="${{ secrets.PROD_MYSQL_URL }}"
            npx prisma generate --schema prisma/mysql/schema.prisma
            echo "── [4/6] Migrations MySQL ──"
            npx prisma migrate deploy --schema prisma/mysql/schema.prisma
            echo "── [5/6] Build Next.js ──"
            npm run hebergeur:build
            echo "── [6/6] Redémarrage Passenger ──"
            mkdir -p tmp
            touch tmp/restart.txt
            echo "✓ PROD déployé — paped-projet.mshpcmu.ci"
